version: "3.9"

services:

  auth-service:
    build:
      context: ./apps/auth-service
      dockerfile: Dockerfile
    container_name: devlink-auth
    ports:
      - "4000:4000"
    env_file:
      - ./apps/auth-service/.env
    depends_on:
      - mongo
    restart: unless-stopped

  chat-service:
    build:
      context: ./apps/chat-service
      dockerfile: Dockerfile
    container_name: devlink-chat
    ports:
      - "5000:5000"
    env_file:
      - ./apps/chat-service/.env
    depends_on:
      - mongo
      - auth-service
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: devlink-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

volumes:
  mongo-data:
